server
{
    listen 443 ssl http2;
    server_name api.example.com;
    root /opt/yaliai-canvas-oss/app/apps/web/dist;
    index index.html;

    access_log /var/log/nginx/yaliai-canvas-oss.access.log;
    error_log /var/log/nginx/yaliai-canvas-oss.error.log;

    ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000";
    add_header X-Yali-VHost api-root always;

    client_max_body_size 128m;

    # Compress large JSON responses such as b64_json image payloads.
    # text/event-stream is intentionally excluded to preserve SSE latency.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 3;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/problem+json
        application/javascript
        text/css
        text/javascript
        text/plain
        application/xml;

    location = /admin {
        return 301 /admin/;
    }

    location = /robots.txt {
        default_type text/plain;
        alias /opt/yaliai-canvas-oss/app/apps/web/dist/robots.txt;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location ^~ /_generated-images/ {
        internal;
        alias /opt/yaliai-canvas-oss/data/generated-images/;
        access_log off;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:4010/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/assets/ {
        alias /opt/yaliai-canvas-oss/app/apps/admin/dist/assets/;
        access_log off;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /assets/ {
        alias /opt/yaliai-canvas-oss/app/apps/web/dist/assets/;
        access_log off;
        expires 7d;
    }

    location /admin/ {
        alias /opt/yaliai-canvas-oss/app/apps/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}

server
{
    listen 80;
    server_name api.example.com;

    if ($host = api.example.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
